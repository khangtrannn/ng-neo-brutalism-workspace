<section class="page">
  <header class="hero">
    <p class="eyebrow">Components</p>
    <h1>Button</h1>
    <p>
      Neo-brutalist buttons with hard borders, offset shadows, strong colors,
      keyboard focus states, and native disabled behavior.
    </p>
  </header>

  <section class="demo-section">
    <h2>Variants</h2>

    <div class="button-row">
      <button nbButton>Default</button>
      <button nbButton variant="primary">Primary</button>
      <button nbButton variant="secondary">Secondary</button>
      <button nbButton variant="danger">Danger</button>
    </div>
  </section>

  <section class="demo-section">
    <h2>Sizes</h2>

    <div class="button-row">
      <button nbButton size="sm" variant="primary">Small</button>
      <button nbButton size="md" variant="primary">Medium</button>
      <button nbButton size="lg" variant="primary">Large</button>
    </div>
  </section>

  <section class="demo-section">
    <h2>Full width</h2>

    <div class="button-stack">
      <button nbButton variant="secondary" [fullWidth]="true">
        Full width button
      </button>
    </div>
  </section>

  <section class="demo-section">
    <h2>Disabled</h2>

    <div class="button-row">
      <button nbButton variant="primary" disabled>
        Disabled button
      </button>

      <a nbButton href="#" aria-disabled="true">
        Disabled link style
      </a>
    </div>
  </section>

  <section class="demo-section">
    <h2>Anchor usage</h2>

    <div class="button-row">
      <a nbButton href="https://angular.dev" target="_blank" rel="noreferrer">
        Angular Docs
      </a>

      <a
        nbButton
        variant="primary"
        href="https://github.com/khangtrannn/ng-neo-brutalism-workspace"
        target="_blank"
        rel="noreferrer"
      >
        GitHub Repo
      </a>
    </div>
  </section>
</section>
